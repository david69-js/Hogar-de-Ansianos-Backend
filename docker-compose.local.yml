services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel-sorherminia-app
    restart: unless-stopped
    working_dir: /var/www/sorherminia
    volumes:
      - ./laravel-app:/var/www/sorherminia
    environment:
      # Laravel specific environment variables
      - APP_ENV=local
      - APP_DEBUG=true
      - LOG_CHANNEL=stderr
      # Database configuration
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_HOST:-mysql_sorherminia}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-sorherminia}
      - DB_USERNAME=${DB_USERNAME:-sorherminia_user}
      - DB_PASSWORD=${DB_PASSWORD:-root}
    networks:
      - laravel
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: nginx_sorherminia
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./laravel-app:/var/www/sorherminia
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: mysql_sorherminia
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sorherminia}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootsorherminia}
      MYSQL_USER: ${DB_USERNAME:-sorherminia_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

networks:
  laravel:
    driver: bridge

volumes:
  dbdata:
